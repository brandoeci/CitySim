networks:
  city-net:
    driver: bridge

volumes:
  postgres-data:

services:

  hz-node:
    image: hazelcast/hazelcast:5.3.8
    environment:
      HZ_CLUSTERNAME: city-cluster
      JAVA_OPTS: "-Xms512m -Xmx1g"
    volumes:
      - ./hazelcast/hazelcast.yaml:/opt/hazelcast/config/hazelcast.yaml:ro
    command: ["hz", "start", "-c", "/opt/hazelcast/config/hazelcast.yaml"]
    networks:
      - city-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5701/hazelcast/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: citysim
      POSTGRES_USER: citysim
      POSTGRES_PASSWORD: citysim
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - city-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citysim -d citysim"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HAZELCAST_ADDRESSES: hz-node:5701
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/citysim
      SPRING_DATASOURCE_USERNAME: citysim
      SPRING_DATASOURCE_PASSWORD: citysim
      SIMULATION_MAX_CARS: "500"
      SIMULATION_TICK_RATE_MS: "50"
      SIMULATION_MIN_SAFE_DISTANCE: "0.15"
      SIMULATION_MAP_GRID_WIDTH: "100"
      SIMULATION_MAP_GRID_HEIGHT: "100"
      SIMULATION_MAP_ZONE_COLS: "5"
      SIMULATION_MAP_ZONE_ROWS: "5"
      SIMULATION_PERSIST_EVERY_N_TICKS: "100"
      JAVA_OPTS: "-Xms512m -Xmx2g"
    depends_on:
      hz-node:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - city-net