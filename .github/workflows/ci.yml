name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend (build, test, coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and test
        working-directory: backend
        run: mvn -B clean verify

      # SonarCloud analiza este repo en modo "Automatic Analysis" (directo
      # desde GitHub, sin pasar por CI) -- SonarCloud no permite tener ambos
      # modos activos a la vez para el mismo proyecto, por eso el analisis
      # via Maven se saco de aqui. Ver docs/SONARCLOUD_SETUP.md.

  frontend:
    name: Frontend (type-check, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        working-directory: frontend
        run: npm run build
