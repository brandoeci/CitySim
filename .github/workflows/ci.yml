name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend (build, test, coverage, SonarCloud)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and test
        working-directory: backend
        run: mvn -B clean verify

      # El analisis de SonarCloud solo corre una vez que el repo tenga los
      # secrets/variables configurados (ver docs/SONARCLOUD_SETUP.md). Hasta
      # entonces se salta sin romper el pipeline de build+test.
      - name: SonarCloud Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
          -Dsonar.coverage.jacoco.xmlReportPaths=simulation-core/target/site/jacoco/jacoco.xml,simulation-engine/target/site/jacoco/jacoco.xml

  frontend:
    name: Frontend (type-check, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        working-directory: frontend
        run: npm run build
